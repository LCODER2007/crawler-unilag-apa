services:
  # Web service running the Flask dashboard
  - type: web
    name: uraas-dashboard
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && playwright install --with-deps chromium && python scripts/init_db.py && mkdir -p storage/pdfs"
    startCommand: "gunicorn -k eventlet -w 1 --timeout 120 --bind 0.0.0.0:$PORT uraas.dashboard.app:app"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: uraas-db
          property: connectionString
      - key: DASHBOARD_SECRET_KEY
        generateValue: true
      - key: STORAGE_PATH
        value: "/opt/render/project/storage"
      - key: RENDER
        value: "true"
    disk:
      name: uraas-storage
      mountPath: /opt/render/project/storage
      sizeGB: 10

databases:
  # PostgreSQL database for storing research data
  - name: uraas-db
    databaseName: uraas_production
    user: uraas_user
    plan: free
